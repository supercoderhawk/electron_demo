name: CI

on:
  push:
    branches:
      - main
      - legacy/electron22
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Install Linux runtime deps for Electron E2E
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb xauth \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            libatspi2.0-0 libdrm2 libgbm1 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libx11-xcb1 \
            libxcb1 libxext6 libxshmfence1 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libpango-1.0-0 libpangocairo-1.0-0 \
            libasound2 || \
          sudo apt-get install -y \
            xvfb xauth \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            libatspi2.0-0 libdrm2 libgbm1 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libx11-xcb1 \
            libxcb1 libxext6 libxshmfence1 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libpango-1.0-0 libpangocairo-1.0-0 \
            libasound2t64

      - name: E2E smoke
        env:
          CI: true
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            playwright-report/**
            test-results/**
