appId: com.yubin.electrondemo
productName: electron-demo
directories:
  buildResources: build
  output: release/modern
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,vitest.config.ts,playwright.config.ts}'
  - '!{coverage/**,e2e/**,.github/**}'
asarUnpack:
  - resources/**
extraMetadata:
  releaseLine: modern
win:
  executableName: electron-demo
  target:
    - target: nsis
      arch:
        - ia32
        - x64
  artifactName: ${name}-${version}-modern-${os}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
mac:
  category: public.app-category.developer-tools
  notarize: false
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
        - universal
    - target: zip
      arch:
        - x64
        - arm64
        - universal
dmg:
  artifactName: ${name}-${version}-modern-${os}-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  maintainer: supercoderhawk
  category: Utility
  artifactName: ${name}-${version}-modern-${os}-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: supercoderhawk
  repo: electron_demo
  vPrefixedTagName: true
